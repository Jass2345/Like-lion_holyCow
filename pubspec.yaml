name: bomb_pass
description: BombPass - 4명이 폭탄을 돌리는 장기전 소셜 게임
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_messaging: ^15.0.4
  cloud_functions: ^5.0.4

  # 상태관리
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # 라우팅
  go_router: ^14.2.7

  # 모델 코드 생성
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # 공유 카드
  screenshot: ^3.0.0

  # UI 유틸
  intl: ^0.19.0
  gap: ^3.0.1
  cached_network_image: ^3.3.1

  # 기타
  uuid: ^4.4.2
  shared_preferences: ^2.3.2
  flutter_local_notifications: ^17.2.2
  vibration: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # 코드 품질
  flutter_lints: ^4.0.0
  very_good_analysis: ^6.0.0

  # 코드 생성
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  custom_lint: ^0.6.7
  riverpod_lint: ^2.3.13

flutter:
  uses-material-design: true
